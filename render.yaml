services:
  - type: web
    name: iptv-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Tuỳ chọn — điền vào nếu bị chặn IP:
      # - key: PROXY_URL
      #   value: http://user:pass@proxy-host:port
      #
      # Override URL nguồn nếu domain thay đổi:
      # - key: HOIQUAN_FRONTEND
      #   value: https://sv2.hoiquan4.live
      # - key: HOIQUAN_API
      #   value: https://sv.hoiquantv.xyz/api/v1/external
      # - key: KHANDAIA_FRONTEND
      #   value: https://tructiep.khandaia.link
      # - key: KHANDAIA_API
      #   value: https://sv.khandai-a.xyz/api/v1/external
      # - key: TIEULAM_FRONTEND
      #   value: https://sv2.tieulam1.live
      # - key: TIEULAM_API
