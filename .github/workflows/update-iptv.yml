name: Tu dong cap nhat IPTV

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: update-iptv
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-iptv:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Auto-redeploy CF Workers (if workers/ changed)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_API_TOKEN:         ${{ secrets.CF_API_TOKEN }}
          TIEULAM_API:          ${{ secrets.TIEULAM_API }}
          RELAY_SECRET:         ${{ secrets.RELAY_SECRET }}
          TIEULAM_REPLIT_RELAY_URL: ${{ secrets.TIEULAM_REPLIT_RELAY_URL }}
          HOIQUAN_API:          ${{ secrets.HOIQUAN_API }}
          KHANDAIA_API:         ${{ secrets.KHANDAIA_API }}
          VONGCAM_API:          ${{ secrets.VONGCAM_API }}
          VONGCAM_ACCESS_TOKEN: ${{ secrets.VONGCAM_TOKEN }}
          VONGCAM_TOKEN:        ${{ secrets.VONGCAM_TOKEN }}
        run: python deploy_workers.py || echo "Worker deploy skipped"

      - name: Test CF Worker health (/healthz)
        env:
          RELAY_SECRET: ${{ secrets.RELAY_SECRET }}
        run: python test_worker_health.py

      - name: Diagnose relay
        env:
          TIEULAM_RELAY_URL:        ${{ secrets.TIEULAM_RELAY_URL }}
          TIEULAM_REPLIT_RELAY_URL: ${{ secrets.TIEULAM_REPLIT_RELAY_URL }}
          RELAY_SECRET:             ${{ secrets.RELAY_SECRET }}
          TIEULAM_API:              ${{ secrets.TIEULAM_API }}
          HOIQUAN_API:              ${{ secrets.HOIQUAN_API }}
          HOIQUAN_FRONTEND:         ${{ secrets.HOIQUAN_FRONTEND }}
          KHANDAIA_API:             ${{ secrets.KHANDAIA_API }}
          KHANDAIA_FRONTEND:        ${{ secrets.KHANDAIA_FRONTEND }}
          VONGCAM_API:              ${{ secrets.VONGCAM_API }}
          VONGCAM_ACCESS_TOKEN:     ${{ secrets.VONGCAM_TOKEN }}
        run: python diagnose_relay.py || echo "Diagnose completed (non-fatal)"

      - name: Run IPTV updater
        env:
          TIEULAM_FRONTEND:         ${{ secrets.TIEULAM_FRONTEND }}
          TIEULAM_API:              ${{ secrets.TIEULAM_API }}
          TIEULAM_CDN:              ${{ secrets.TIEULAM_CDN }}
          TIEULAM_ASYNC_CDN:        ${{ secrets.TIEULAM_ASYNC_CDN }}
          TIEULAM_RELAY_URL:        ${{ secrets.TIEULAM_RELAY_URL }}
          TIEULAM_REPLIT_RELAY_URL: ${{ secrets.TIEULAM_REPLIT_RELAY_URL }}
          RELAY_SECRET:             ${{ secrets.RELAY_SECRET }}
          HOIQUAN_FRONTEND:         ${{ secrets.HOIQUAN_FRONTEND }}
          HOIQUAN_API:              ${{ secrets.HOIQUAN_API }}
          HOIQUAN_RELAY_URL:        ${{ secrets.HOIQUAN_RELAY_URL }}
          KHANDAIA_FRONTEND:        ${{ secrets.KHANDAIA_FRONTEND }}
          KHANDAIA_API:             ${{ secrets.KHANDAIA_API }}
          KHANDAIA_RELAY_URL:       ${{ secrets.KHANDAIA_RELAY_URL }}
          VONGCAM_FRONTEND:         ${{ secrets.VONGCAM_FRONTEND }}
          VONGCAM_API:              ${{ secrets.VONGCAM_API }}
          VONGCAM_TOKEN:            ${{ secrets.VONGCAM_TOKEN }}
          VONGCAM_ACCESS_TOKEN:     ${{ secrets.VONGCAM_TOKEN }}
          VONGCAM_RELAY_URL:        ${{ secrets.VONGCAM_RELAY_URL }}
          VTV_M3U_URL:              ${{ secrets.VTV_M3U_URL }}
          MATCH_MAX_DURATION:       ${{ secrets.MATCH_MAX_DURATION }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Action Bot"
          git add dekki.m3u
          if git diff --staged --quiet; then
            echo "Khong co thay doi. Bo qua commit."
          else
            TIMESTAMP=$(TZ='Asia/Ho_Chi_Minh' date '+%Y-%m-%d %H:%M:%S ICT')
            git commit -m "cap nhat dekki.m3u luc ${TIMESTAMP} [skip ci]"
            git pull --rebase origin xemtv
            git push origin xemtv
          fi
