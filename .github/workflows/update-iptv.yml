name: Auto Update IPTV

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run IPTV updater
        env:
          TIEULAM_FRONTEND:  ${{ secrets.TIEULAM_FRONTEND }}
          TIEULAM_API:       ${{ secrets.TIEULAM_API }}
          TIEULAM_CDN:       ${{ secrets.TIEULAM_CDN }}
          TIEULAM_RELAY_URL: ${{ secrets.TIEULAM_RELAY_URL }}
          RELAY_SECRET:      ${{ secrets.RELAY_SECRET }}
          HOIQUAN_FRONTEND:  ${{ secrets.HOIQUAN_FRONTEND }}
          HOIQUAN_API:       ${{ secrets.HOIQUAN_API }}
          KHANDAIA_FRONTEND: ${{ secrets.KHANDAIA_FRONTEND }}
          KHANDAIA_API:      ${{ secrets.KHANDAIA_API }}
          VTV_M3U_URL:       ${{ secrets.VTV_M3U_URL }}
          MATCH_MAX_DURATION: ${{ secrets.MATCH_MAX_DURATION }}
        run: python main.py

      - name: Commit and push dekki.m3u
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dekki.m3u
          if git diff --cached --quiet; then
            echo "Không có thay đổi, bỏ qua commit."
          else
            TIMESTAMP=$(TZ='Asia/Ho_Chi_Minh' date '+%Y-%m-%d %H:%M:%S ICT')
            git commit -m "chore: cập nhật dekki.m3u lúc ${TIMESTAMP}"
            git push
          fi
