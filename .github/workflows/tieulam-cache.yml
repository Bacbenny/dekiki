name: Update TieuLam Cache

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install "httpx[http2]>=0.27.0"

      - name: Fetch TieuLam matches
        run: python scripts/fetch_tieulam.py

      - name: Commit & push cache
        run: |
          git config user.name  "tieulam-bot"
          git config user.email "tieulam-bot@users.noreply.github.com"
          git add tieulam_cache.json
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "chore: update tieulam cache [skip ci]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
